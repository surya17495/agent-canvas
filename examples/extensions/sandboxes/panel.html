<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; connect-src 'none'; form-action 'none'; base-uri 'none';"
    />
    <title>Sandboxes</title>
    <style>
      :root {
        /* Background layers */
        --oh-background: #0B0E14;
        --oh-surface: #21252F;
        --oh-surface-raised: #2C313F;
        --oh-surface-deep: #05070A;
        
        /* Text */
        --oh-foreground: #EEF2F7;
        --oh-text-secondary: #C3CDDC;
        --oh-muted: #A3B0C4;
        --oh-text-dim: #7E8A9E;
        
        /* Borders */
        --oh-border: #4B5468;
        --oh-border-subtle: #383F50;
        
        /* Interactive */
        --oh-interactive-hover: #4B5468;
        --oh-interactive-hover-low: #2C313F;
        
        /* Accents */
        --oh-color-primary: #c9b974;
        --oh-color-success: #a5e75e;
        --oh-color-danger: #e76a5e;
        --oh-color-warning: #f0b429;
        
        /* Radius */
        --oh-radius: 8px;
        --oh-radius-lg: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        background: var(--oh-background);
      }
      
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 0;
        color: var(--oh-foreground);
        font-size: 14px;
        line-height: 1.5;
      }

      /* Page container - matches automations */
      .page-container {
        max-width: 56rem; /* max-w-4xl */
        margin: 0 auto;
        padding: 24px;
      }

      /* Page header - matches automations */
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .page-header-text {
        min-width: 0;
      }

      .page-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--oh-foreground);
      }

      .page-subtitle {
        margin: 4px 0 0 0;
        font-size: 0.875rem;
        color: var(--oh-muted);
      }

      /* Brand button - matches BrandButton secondary variant */
      .brand-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 16px;
        min-height: 36px;
        background: var(--oh-surface);
        border: 1px solid var(--oh-border);
        border-radius: var(--oh-radius);
        color: var(--oh-foreground);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: background-color 0.15s ease;
        flex-shrink: 0;
      }

      .brand-btn:hover {
        background: var(--oh-surface-raised);
      }

      .brand-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .brand-btn svg {
        width: 16px;
        height: 16px;
      }

      /* Add conversation button - smaller, fits in expanded section */
      .add-conversation-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: transparent;
        border: 1px dashed var(--oh-border);
        border-radius: var(--oh-radius);
        color: var(--oh-text-secondary);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s ease;
        margin-top: 8px;
      }

      .add-conversation-btn:hover {
        background: var(--oh-interactive-hover-low);
        border-color: var(--oh-color-primary);
        color: var(--oh-color-primary);
      }

      .add-conversation-btn svg {
        width: 14px;
        height: 14px;
      }

      /* Toolbar - search and filters */
      .toolbar {
        margin-top: 24px;
        display: flex;
        align-items: stretch;
        gap: 8px;
      }

      .search-container {
        flex: 1;
        position: relative;
      }

      .search-input {
        width: 100%;
        padding: 8px 12px 8px 36px;
        background: var(--oh-surface);
        border: 1px solid var(--oh-border);
        border-radius: var(--oh-radius);
        color: var(--oh-foreground);
        font-size: 14px;
      }

      .search-input::placeholder {
        color: var(--oh-text-dim);
      }

      .search-input:focus {
        outline: none;
        border-color: var(--oh-color-primary);
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--oh-text-dim);
        font-size: 14px;
      }

      .filter-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: var(--oh-surface);
        border: 1px solid var(--oh-border);
        border-radius: var(--oh-radius);
        color: var(--oh-foreground);
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
      }

      .filter-btn:hover {
        background: var(--oh-interactive-hover-low);
      }

      .filter-btn.active {
        border-color: var(--oh-color-primary);
        color: var(--oh-color-primary);
      }

      /* Content sections */
      .content-sections {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Section group - matches AutomationGroup */
      .section-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--oh-foreground);
        margin: 0;
      }

      .section-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        height: 24px;
        padding: 0 8px;
        background: var(--oh-surface-raised);
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 500;
        color: var(--oh-text-secondary);
      }

      .load-more-row {
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .load-more-row td {
        padding: 12px 16px;
        text-align: left;
        border-top: 1px solid var(--oh-border);
      }

      .load-more-row:hover {
        background: var(--oh-surface-raised);
      }

      .load-more-text {
        color: var(--oh-text-secondary);
        font-size: 13px;
      }

      .load-more-row:hover .load-more-text {
        color: var(--oh-foreground);
      }

      /* Table container - matches automations list */
      .table-container {
        border: 1px solid var(--oh-border);
        border-radius: var(--oh-radius-lg);
        background: var(--oh-surface);
        overflow: hidden;
      }

      .sandbox-table {
        width: 100%;
        border-collapse: collapse;
      }

      .sandbox-row {
        border-top: 1px solid var(--oh-border);
        transition: background-color 150ms;
        cursor: pointer;
      }

      .sandbox-row:first-child {
        border-top: none;
      }

      .sandbox-row:hover {
        background: var(--oh-interactive-hover-low);
      }

      .sandbox-row.expanded {
        background: var(--oh-surface-raised);
      }

      .sandbox-cell {
        padding: 12px 16px;
        vertical-align: middle;
      }

      .sandbox-cell:first-child {
        padding-left: 16px;
      }

      .sandbox-cell:last-child {
        padding-right: 20px;
      }

      .sandbox-cell-main {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .expand-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        color: var(--oh-text-dim);
        transition: transform 0.15s ease, color 0.15s ease;
      }

      .sandbox-row:hover .expand-toggle {
        color: var(--oh-text-secondary);
      }

      .sandbox-row.expanded .expand-toggle {
        transform: rotate(90deg);
        color: var(--oh-foreground);
      }

      .sandbox-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        color: var(--oh-muted);
      }

      .sandbox-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
        flex: 1;
      }

      .sandbox-name {
        font-weight: 500;
        color: var(--oh-foreground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 300px;
      }

      .sandbox-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sandbox-id {
        font-size: 12px;
        color: var(--oh-text-dim);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .sandbox-id.copyable {
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        transition: background 0.15s ease;
      }

      .sandbox-id.copyable:hover {
        background: var(--oh-surface-raised);
        color: var(--oh-text-secondary);
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        background: var(--oh-surface-raised);
        border-radius: 9999px;
        font-size: 11px;
        color: var(--oh-text-secondary);
      }

      .sandbox-name-input {
        background: var(--oh-surface-deep);
        border: 1px solid var(--oh-color-primary);
        border-radius: 4px;
        color: var(--oh-foreground);
        padding: 4px 8px;
        font-size: 14px;
        width: 200px;
      }

      .sandbox-name-input:focus {
        outline: none;
        border-color: var(--oh-color-primary);
      }

      /* Status badges - smaller, inline */
      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .status-running {
        background: rgba(165, 231, 94, 0.15);
        color: #a5e75e;
      }

      .status-paused {
        background: rgba(201, 185, 116, 0.15);
        color: #c9b974;
      }

      .status-starting {
        background: rgba(240, 180, 41, 0.15);
        color: #f0b429;
      }

      .status-error {
        background: rgba(231, 106, 94, 0.15);
        color: #e76a5e;
      }

      .status-missing, .status-stopped {
        background: rgba(126, 138, 158, 0.15);
        color: #7E8A9E;
      }

      /* Actions cell */
      .sandbox-cell-actions {
        white-space: nowrap;
      }

      .actions-row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
      }

      /* Buttons - matching automations style */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 150ms, opacity 150ms;
        border: 1px solid var(--oh-border);
        background: transparent;
        color: var(--oh-foreground);
      }

      .btn:hover:not(:disabled) {
        background: var(--oh-interactive-hover-low);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--oh-color-primary);
        border-color: var(--oh-color-primary);
        color: var(--oh-background);
      }

      .btn-primary:hover:not(:disabled) {
        opacity: 0.9;
        background: var(--oh-color-primary);
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
      }

      .btn-icon {
        padding: 6px;
        border-radius: 6px;
      }

      /* Expanded content - section card style */
      .sandbox-expanded {
        display: none;
        border-top: 1px solid var(--oh-border-subtle);
      }

      .sandbox-row.expanded + .sandbox-expanded-row .sandbox-expanded {
        display: block;
      }

      .expanded-content {
        padding: 16px 20px;
        background: var(--oh-surface-deep);
      }

      .expanded-section {
        margin-bottom: 16px;
      }

      .expanded-section:last-child {
        margin-bottom: 0;
      }

      .expanded-section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .expanded-section-icon {
        width: 16px;
        height: 16px;
        color: var(--oh-muted);
      }

      .expanded-section-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--oh-text-secondary);
        margin: 0;
      }

      .conversation-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .conversation-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .conversation-item:hover {
        background: var(--oh-interactive-hover-low);
      }

      .conversation-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
        flex: 1;
      }

      .conversation-title {
        color: var(--oh-foreground);
        font-weight: 500;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .conversation-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--oh-text-dim);
      }

      .conversation-time {
        font-size: 12px;
        color: var(--oh-text-dim);
      }

      .conversation-arrow {
        color: var(--oh-text-dim);
        flex-shrink: 0;
        margin-left: 8px;
        transition: color 0.15s ease;
      }

      .conversation-item:hover .conversation-arrow {
        color: var(--oh-foreground);
      }

      .conn-status {
        font-size: 11px;
        padding: 1px 6px;
        border-radius: 4px;
        margin-left: 8px;
      }

      .conn-ready {
        color: var(--oh-success);
        background: rgba(34, 197, 94, 0.1);
      }

      .conn-missing {
        color: var(--oh-warning, #f59e0b);
        background: rgba(245, 158, 11, 0.1);
      }

      .no-conversations {
        color: var(--oh-text-dim);
        font-size: 13px;
        padding: 16px;
        text-align: center;
      }

      /* Config fields - like automations detail */
      .config-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }

      .config-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .config-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--oh-text-dim);
      }

      .config-value {
        font-size: 13px;
        color: var(--oh-text-secondary);
      }

      /* States */
      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
        color: var(--oh-text-secondary);
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--oh-border);
        border-top-color: var(--oh-color-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 80px 24px;
        color: var(--oh-text-secondary);
      }

      .empty-state-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        color: var(--oh-text-dim);
      }

      .empty-state h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        font-weight: 500;
        color: var(--oh-foreground);
      }

      .empty-state p {
        margin: 0;
        font-size: 14px;
      }

      .error-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 40px 24px;
        margin-top: 24px;
        background: rgba(231, 106, 94, 0.1);
        border: 1px solid rgba(231, 106, 94, 0.2);
        border-radius: var(--oh-radius-lg);
      }

      .error-state p {
        margin: 0 0 16px 0;
        color: var(--oh-color-danger);
      }

      .not-cloud-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 80px 24px;
      }

      .not-cloud-state-icon {
        width: 48px;
        height: 48px;
        margin-bottom: 16px;
        color: var(--oh-text-dim);
      }

      .not-cloud-state h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        font-weight: 500;
        color: var(--oh-foreground);
      }

      .not-cloud-state p {
        margin: 0;
        font-size: 14px;
        color: var(--oh-text-secondary);
      }

      /* Refresh button in header */
      .refresh-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: transparent;
        border: 1px solid var(--oh-border);
        border-radius: var(--oh-radius);
        color: var(--oh-foreground);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 150ms;
      }

      .refresh-btn:hover {
        background: var(--oh-interactive-hover-low);
      }

      .refresh-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* SVG icons */
      .icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .icon-sm {
        width: 14px;
        height: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="page-container">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>Loading sandboxes...</div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        // ===== API Setup =====
        var parentWindow = window.parent;
        var nextId = 1;
        var pending = {};

        window.addEventListener("message", function(event) {
          if (event.source !== parentWindow) return;
          var msg = event.data;
          
          // Handle theme updates (host sends { type: "agentCanvas:theme", variables: {...} })
          if (msg && msg.type === "agentCanvas:theme") {
            applyTheme(msg.variables);
            return;
          }
          
          if (!msg || msg.kind !== "response") {
            // Ignore non-response messages (ready signal, etc.)
            return;
          }
          var entry = pending[msg.id];
          if (!entry) return;
          delete pending[msg.id];
          if (msg.error !== undefined) entry.reject(new Error(msg.error));
          else entry.resolve(msg.result);
        });

        function request(method, params) {
          var id = nextId++;
          return new Promise(function(resolve, reject) {
            pending[id] = { resolve: resolve, reject: reject };
            parentWindow.postMessage(
              { kind: "request", id: id, method: method, params: params },
              "*"
            );
          });
        }

        var agentCanvas = {
          backend: {
            cloudFetch: function(params) {
              return request("backend.cloudFetch", params);
            }
          },
          storage: {
            get: function(key) { return request("storage.get", { key: key }); },
            set: function(key, value) { return request("storage.set", { key: key, value: value }); }
          },
          window: {
            showInformationMessage: function(message) {
              return request("window.showInformationMessage", { message: message });
            },
            showErrorMessage: function(message) {
              return request("window.showErrorMessage", { message: message });
            }
          },
          navigation: {
            navigate: function(path) {
              return request("navigation.navigate", { path: path });
            }
          },
          conversation: {
            create: function(options) {
              return request("conversation.create", { options: options });
            }
          }
        };

        // ===== Theme =====
        function applyTheme(variables) {
          if (!variables) return;
          var root = document.documentElement;
          // Variables come with their full names (e.g., "--oh-background")
          Object.keys(variables).forEach(function(name) {
            root.style.setProperty(name, variables[name]);
          });
        }

        // ===== State =====
        var SECTION_PAGE_SIZE = 5; // Initial limit per section
        
        var state = {
          sandboxes: [],
          conversations: [],
          sandboxNames: {},
          expandedSandboxes: new Set(),
          expandedSections: new Set(), // Sections that show all items
          editingSandboxId: null,
          filters: { running: true, paused: true, stopped: false },
          sortBy: "status",
          searchQuery: "",
          loading: true,
          error: null,
          cloudAvailable: null
        };

        // ===== Helpers =====
        function relativeTime(isoString) {
          if (!isoString) return "—";
          var date = new Date(isoString);
          var now = new Date();
          var diffMs = now - date;
          var diffMin = Math.floor(diffMs / 60000);
          var diffHr = Math.floor(diffMin / 60);
          var diffDays = Math.floor(diffHr / 24);
          
          if (diffMin < 1) return "just now";
          if (diffMin < 60) return diffMin + " minute" + (diffMin > 1 ? "s" : "") + " ago";
          if (diffHr < 24) return diffHr + " hour" + (diffHr > 1 ? "s" : "") + " ago";
          if (diffDays < 7) {
            return date.toLocaleDateString("en", { weekday: "long" });
          }
          return diffDays + " days ago";
        }

        function getStatusPriority(status) {
          var priorities = { RUNNING: 1, STARTING: 2, PAUSED: 3, ERROR: 4, MISSING: 5 };
          return priorities[status] || 6;
        }

        function groupConversationsBySandbox() {
          var groups = {};
          state.conversations.forEach(function(conv) {
            var sid = conv.sandbox_id;
            if (!sid) return;
            if (!groups[sid]) {
              groups[sid] = {
                sandboxId: sid,
                conversations: [],
                lastActive: null,
                status: conv.sandbox_status || "MISSING"
              };
            }
            groups[sid].conversations.push(conv);
            var convUpdated = new Date(conv.updated_at);
            if (!groups[sid].lastActive || convUpdated > new Date(groups[sid].lastActive)) {
              groups[sid].lastActive = conv.updated_at;
            }
          });
          
          // Merge with sandbox info
          state.sandboxes.forEach(function(sb) {
            if (!sb || !sb.id) return; // Skip null/invalid entries
            if (!groups[sb.id]) {
              groups[sb.id] = {
                sandboxId: sb.id,
                conversations: [],
                lastActive: sb.created_at,
                status: sb.status
              };
            }
            groups[sb.id].sandboxInfo = sb;
            groups[sb.id].status = sb.status;
            groups[sb.id].createdAt = sb.created_at;
          });
          
          return Object.values(groups);
        }

        function filterAndSort(groups) {
          // Filter by status (STARTING is grouped with Running)
          var filtered = groups.filter(function(g) {
            var status = (g.status || "").toUpperCase();
            if ((status === "RUNNING" || status === "STARTING") && !state.filters.running) return false;
            if (status === "PAUSED" && !state.filters.paused) return false;
            if ((status === "MISSING" || status === "ERROR" || status === "STOPPED") && !state.filters.stopped) return false;
            return true;
          });
          
          // Filter by search query
          if (state.searchQuery) {
            var query = state.searchQuery.toLowerCase();
            filtered = filtered.filter(function(g) {
              var displayName = state.sandboxNames[g.sandboxId] || g.sandboxId;
              if (displayName.toLowerCase().indexOf(query) !== -1) return true;
              if (g.sandboxId.toLowerCase().indexOf(query) !== -1) return true;
              // Also search conversation titles
              return g.conversations.some(function(conv) {
                return (conv.title || "").toLowerCase().indexOf(query) !== -1;
              });
            });
          }
          
          // Sort by last active (most recent first)
          filtered.sort(function(a, b) {
            var aTime = new Date(a.lastActive || 0);
            var bTime = new Date(b.lastActive || 0);
            return bTime - aTime;
          });
          
          return filtered;
        }

        // ===== API Calls =====
        async function fetchData() {
          state.loading = true;
          state.error = null;
          render();
          
          try {
            // Fetch conversations (includes sandbox info)
            var convResponse = await agentCanvas.backend.cloudFetch({
              path: "/api/v1/app-conversations/search?limit=100&sort_order=UPDATED_AT_DESC",
              method: "GET"
            });
            
            if (convResponse === null) {
              state.cloudAvailable = false;
              state.loading = false;
              render();
              return;
            }
            
            state.cloudAvailable = true;
            
            if (!convResponse.ok) {
              throw new Error("Failed to fetch conversations: " + (convResponse.status || "unknown error"));
            }
            
            // The API returns { items: [...], next_page_id: N } 
            var responseData = convResponse.data;
            state.conversations = Array.isArray(responseData) 
              ? responseData 
              : (responseData?.items || responseData?.results || []);
            
            // Extract unique sandbox IDs
            var sandboxIds = [];
            state.conversations.forEach(function(conv) {
              if (conv.sandbox_id && sandboxIds.indexOf(conv.sandbox_id) === -1) {
                sandboxIds.push(conv.sandbox_id);
              }
            });
            
            // Fetch sandbox details if we have any
            if (sandboxIds.length > 0) {
              var idsParam = sandboxIds.map(function(id) { return "id=" + encodeURIComponent(id); }).join("&");
              var sbResponse = await agentCanvas.backend.cloudFetch({
                path: "/api/v1/sandboxes?" + idsParam,
                method: "GET"
              });
              
              if (sbResponse && sbResponse.ok) {
                var sbData = sbResponse.data;
                // Handle both array and { items: [...] } formats, filter out nulls
                var sandboxList = Array.isArray(sbData) 
                  ? sbData 
                  : (sbData?.items || sbData?.results || []);
                state.sandboxes = sandboxList.filter(function(sb) { return sb && sb.id; });
              }
            }
            
            // Load saved names
            var savedNames = await agentCanvas.storage.get("sandbox-names");
            state.sandboxNames = savedNames || {};
            
            state.loading = false;
            render();
          } catch (err) {
            state.error = err.message;
            state.loading = false;
            render();
          }
        }

        // Track sandboxes we're currently waking/pausing
        var pendingActions = new Set();

        async function pauseSandbox(sandboxId) {
          if (pendingActions.has(sandboxId)) return;
          pendingActions.add(sandboxId);
          
          try {
            var response = await agentCanvas.backend.cloudFetch({
              path: "/api/v1/sandboxes/" + encodeURIComponent(sandboxId) + "/pause",
              method: "POST"
            });
            
            if (response && response.ok) {
              // Refresh immediately to show status change
              await fetchData();
              await agentCanvas.window.showInformationMessage("Sandbox paused");
            } else {
              throw new Error("Failed to pause sandbox");
            }
          } catch (err) {
            await agentCanvas.window.showErrorMessage("Error: " + err.message);
          } finally {
            pendingActions.delete(sandboxId);
          }
        }

        async function resumeSandbox(sandboxId) {
          if (pendingActions.has(sandboxId)) return;
          pendingActions.add(sandboxId);
          
          try {
            var response = await agentCanvas.backend.cloudFetch({
              path: "/api/v1/sandboxes/" + encodeURIComponent(sandboxId) + "/resume",
              method: "POST"
            });
            
            if (response && response.ok) {
              // Refresh immediately to show STARTING status
              await fetchData();
              // Start polling for status changes
              pollSandboxStatus(sandboxId);
            } else {
              throw new Error("Failed to wake sandbox");
            }
          } catch (err) {
            await agentCanvas.window.showErrorMessage("Error: " + err.message);
            pendingActions.delete(sandboxId);
          }
        }

        // Poll for sandbox status changes after wake request
        function pollSandboxStatus(sandboxId) {
          var pollCount = 0;
          var maxPolls = 60; // Poll for up to 2 minutes (every 2 seconds)
          
          var pollInterval = setInterval(async function() {
            pollCount++;
            
            try {
              await fetchData();
              
              // Find the sandbox's current status
              var groups = groupConversationsBySandbox();
              var sandbox = groups.find(function(g) { return g.sandboxId === sandboxId; });
              var status = sandbox ? (sandbox.status || "").toUpperCase() : null;
              
              if (status === "RUNNING") {
                clearInterval(pollInterval);
                pendingActions.delete(sandboxId);
                await agentCanvas.window.showInformationMessage("Sandbox is now running");
              } else if (status === "ERROR" || status === "MISSING") {
                clearInterval(pollInterval);
                pendingActions.delete(sandboxId);
                await agentCanvas.window.showErrorMessage("Sandbox failed to wake");
              } else if (pollCount >= maxPolls) {
                clearInterval(pollInterval);
                pendingActions.delete(sandboxId);
                await agentCanvas.window.showInformationMessage("Sandbox is still waking up...");
              }
              // Otherwise keep polling (status is STARTING, PAUSED transitioning, etc.)
            } catch (err) {
              // Keep polling on transient errors
              if (pollCount >= maxPolls) {
                clearInterval(pollInterval);
                pendingActions.delete(sandboxId);
              }
            }
          }, 2000);
        }

          state.sandboxNames[sandboxId] = name;
          await agentCanvas.storage.set("sandbox-names", state.sandboxNames);
          state.editingSandboxId = null;
          render();
        }

        // ===== Render =====
        // SVG icons as inline strings
        var ICONS = {

          plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'
        };

        // Track previous render state for incremental updates
        var previousRenderState = null;
        
        function render(options) {
          options = options || {};
          var forceFullRender = options.force || false;
          var app = document.getElementById("app");
          
          // Save edit state before any render
          var editState = null;
          if (state.editingSandboxId) {
            var editInput = document.getElementById("name-input-" + state.editingSandboxId);
            if (editInput) {
              editState = {
                sandboxId: state.editingSandboxId,
                value: editInput.value,
                selectionStart: editInput.selectionStart,
                selectionEnd: editInput.selectionEnd
              };
            }
          }
          
          // Not connected to cloud
          if (state.cloudAvailable === false) {
            app.innerHTML = '\
              <div class="page-container">\

                  ' + ICONS.cloudOff + '\
                  <h3>Cloud Backend Required</h3>\
                  <p>Connect to a cloud backend to manage sandboxes.</p>\
                </div>\
              </div>';
            previousRenderState = null;
            return;
          }
          
          // Loading (only show on initial load, not refreshes)
          if (state.loading && !previousRenderState) {
            app.innerHTML = '\
              <div class="page-container">\

          if (state.error) {

              <div class="page-container">\

                </div>\
                <div class="error-state">\

                  <button class="btn" onclick="window.refresh()">Try Again</button>\
                </div>\
              </div>';
            previousRenderState = null;
            return;
          }
          
          // If we're still loading but have previous data, skip full re-render
          if (state.loading && previousRenderState) {
            return;
          }
          
          var groups = groupConversationsBySandbox();
          var filtered = filterAndSort(groups);
          
          // Count by status
          var runningCount = groups.filter(function(g) { return (g.status || "").toUpperCase() === "RUNNING"; }).length;
          var pausedCount = groups.filter(function(g) { return (g.status || "").toUpperCase() === "PAUSED"; }).length;
          var stoppedCount = groups.filter(function(g) { 
            var s = (g.status || "").toUpperCase();
            return s === "MISSING" || s === "ERROR" || s === "STOPPED";
          }).length;
          
          var html = '\
            <div class="page-container">\
              <div class="page-header">\
                <div class="page-header-text">\
                  <h1 class="page-title">Sandboxes</h1>\
                  <p class="page-subtitle">Manage your cloud sandbox environments.</p>\
                </div>\
                <div style="display: flex; gap: 8px; align-items: center;">\
                  <button class="brand-btn" id="new-sandbox-btn">' + ICONS.plus + ' New Sandbox</button>\
                  <button class="refresh-btn" onclick="window.refresh()">' + ICONS.refresh + '</button>\
                </div>\
              </div>\
              <div class="toolbar">\
                <div class="search-container">\
                  <span class="search-icon">' + ICONS.search + '</span>\
                  <input type="text" class="search-input" id="search-input" placeholder="Search sandboxes..." value="' + escapeHtml(state.searchQuery || '') + '">\
                </div>\
                <button class="filter-btn' + (state.filters.running ? ' active' : '') + '" id="filter-running" title="' + runningCount + ' running">\
                  Running <span class="section-count">' + runningCount + '</span>\
                </button>\
                <button class="filter-btn' + (state.filters.paused ? ' active' : '') + '" id="filter-paused" title="' + pausedCount + ' paused">\
                  Paused <span class="section-count">' + pausedCount + '</span>\
                </button>\
                <button class="filter-btn' + (state.filters.stopped ? ' active' : '') + '" id="filter-stopped" title="' + stoppedCount + ' stopped">\
                  Stopped <span class="section-count">' + stoppedCount + '</span>\
                </button>\
              </div>\
              <div class="content-sections">';
          
          if (filtered.length === 0) {
            html += '\
                <div class="empty-state">\
                  ' + ICONS.inbox + '\
                  <h3>No sandboxes found</h3>\
                  <p>Adjust filters or create a new conversation to start a sandbox.</p>\
                </div>';
          } else {
            // Group by status (STARTING goes with Running since it's transitioning to running)
            var running = filtered.filter(function(g) { 
              var s = (g.status || "").toUpperCase();
              return s === "RUNNING" || s === "STARTING";
            });
            var paused = filtered.filter(function(g) { return (g.status || "").toUpperCase() === "PAUSED"; });
            var stopped = filtered.filter(function(g) { 
              var s = (g.status || "").toUpperCase();
              return s !== "RUNNING" && s !== "STARTING" && s !== "PAUSED";
            });
            
            if (running.length > 0) {
              html += renderSandboxGroup("Running", running);
            }
            if (paused.length > 0) {
              html += renderSandboxGroup("Paused", paused);
            }
            if (stopped.length > 0) {
              html += renderSandboxGroup("Stopped", stopped);
            }
          }
          
          html += '</div></div>';
          
          // Determine which sandbox sections each sandbox belongs to
          function getSectionKey(status) {
            var s = (status || '').toUpperCase();
            if (s === 'RUNNING' || s === 'STARTING') return 'running';
            if (s === 'PAUSED') return 'paused';
            return 'stopped';
          }
          
          // Try incremental update if structure hasn't changed
          // Structure = which sandboxes exist, which sections they're in, filter/expand state
          var newRenderState = {
            sandboxSections: filtered.map(function(g) { return g.sandboxId + ':' + getSectionKey(g.status); }).join(','),
            filterState: JSON.stringify(state.filters),
            searchQuery: state.searchQuery,
            expandedRows: Array.from(state.expandedSandboxes).sort().join(','),
            expandedSections: Array.from(state.expandedSections).sort().join(','),
            editingId: state.editingSandboxId || ''
          };
          
          var canDoIncrementalUpdate = previousRenderState && 
            previousRenderState.sandboxSections === newRenderState.sandboxSections &&
            previousRenderState.filterState === newRenderState.filterState &&
            previousRenderState.searchQuery === newRenderState.searchQuery &&
            previousRenderState.expandedRows === newRenderState.expandedRows &&
            previousRenderState.expandedSections === newRenderState.expandedSections &&
            previousRenderState.editingId === newRenderState.editingId &&
            !forceFullRender;
          
          if (canDoIncrementalUpdate) {
            // Just update the parts that changed (status badges, action buttons, counts)
            updateSandboxRows(filtered);
            updateFilterCounts(groups);
          } else {
            // Full re-render
            app.innerHTML = html;
            attachEventListeners();
            previousRenderState = newRenderState;
            
            // Restore edit state after full render
            if (editState && state.editingSandboxId === editState.sandboxId) {
              var input = document.getElementById("name-input-" + editState.sandboxId);
              if (input) {
                input.value = editState.value;
                input.setSelectionRange(editState.selectionStart, editState.selectionEnd);
                input.focus();
              }
            }
          }
        }
        
        // Incremental update: just update dynamic parts of existing rows
        function updateSandboxRows(groups) {
          groups.forEach(function(group) {
            var sandboxId = group.sandboxId;
            var status = (group.status || "MISSING").toUpperCase();
            var statusClass = "status-" + status.toLowerCase();
            var isPending = pendingActions.has(sandboxId);
            
            // Update status badge
            var row = document.querySelector('[data-sandbox-id="' + sandboxId + '"]');
            if (row) {
              var badge = row.querySelector('.status-badge');
              if (badge) {
                badge.className = 'status-badge ' + statusClass;
                badge.textContent = status;
              }
              
              // Update action button
              var actionsRow = row.querySelector('.actions-row');
              if (actionsRow) {
                var btnHtml = '';
                if (status === "RUNNING") {
                  btnHtml = '<button class="btn btn-sm" data-action="pause" data-sandbox="' + sandboxId + '"' + (isPending ? ' disabled' : '') + '>Pause</button>';
                } else if (status === "PAUSED") {
                  btnHtml = '<button class="btn btn-primary btn-sm" data-action="resume" data-sandbox="' + sandboxId + '"' + (isPending ? ' disabled' : '') + '>' + (isPending ? 'Waking...' : 'Wake') + '</button>';
                } else if (status === "STARTING") {
                  btnHtml = '<button class="btn btn-sm" disabled>Starting...</button>';
                }
                actionsRow.innerHTML = btnHtml;
                
                // Re-attach action listeners for this row
                actionsRow.querySelectorAll("[data-action]").forEach(function(btn) {
                  btn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    var action = this.dataset.action;
                    var sid = this.dataset.sandbox;
                    if (action === "pause") pauseSandbox(sid);
                    else if (action === "resume") resumeSandbox(sid);
                  });
                });
              }
            }
          });
        }
        
        // Update the filter button counts
        function updateFilterCounts(groups) {
          var runningCount = groups.filter(function(g) { 
            var s = (g.status || "").toUpperCase();
            return s === "RUNNING" || s === "STARTING";
          }).length;
          var pausedCount = groups.filter(function(g) { return (g.status || "").toUpperCase() === "PAUSED"; }).length;
          var stoppedCount = groups.filter(function(g) { 
            var s = (g.status || "").toUpperCase();
            return s === "MISSING" || s === "ERROR" || s === "STOPPED";
          }).length;
          
          var runningBtn = document.getElementById("filter-running");
          var pausedBtn = document.getElementById("filter-paused");
          var stoppedBtn = document.getElementById("filter-stopped");
          
          if (runningBtn) {
            var span = runningBtn.querySelector('.section-count');
            if (span) span.textContent = runningCount;
            runningBtn.title = runningCount + ' running';
          }
          if (pausedBtn) {
            var span = pausedBtn.querySelector('.section-count');
            if (span) span.textContent = pausedCount;
            pausedBtn.title = pausedCount + ' paused';
          }
          if (stoppedBtn) {
            var span = stoppedBtn.querySelector('.section-count');
            if (span) span.textContent = stoppedCount;
            stoppedBtn.title = stoppedCount + ' stopped';
          }
        }

        function renderSandboxGroup(title, sandboxes) {
          var sectionKey = title.toLowerCase();
          var isExpanded = state.expandedSections.has(sectionKey);
          var totalCount = sandboxes.length;
          var displayCount = isExpanded ? totalCount : Math.min(totalCount, SECTION_PAGE_SIZE);
          var hasMore = totalCount > SECTION_PAGE_SIZE && !isExpanded;
          var hiddenCount = totalCount - displayCount;
          
          var html = '\
            <section class="section-group" data-section="' + sectionKey + '">\
              <div class="section-header">\
                <h2 class="section-title">' + escapeHtml(title) + '</h2>\
                <span class="section-count">' + totalCount + '</span>\
              </div>\
              <div class="table-container">\
                <table class="sandbox-table">\
                  <tbody>';
          
          // Only render up to the limit
          for (var i = 0; i < displayCount; i++) {
            html += renderSandboxRow(sandboxes[i]);
          }
          
          // Show "Load more" row if there are hidden items
          if (hasMore) {
            html += '\
              <tr class="load-more-row" data-section="' + sectionKey + '">\
                <td colspan="2">\
                  <span class="load-more-text">Load more</span>\
                </td>\
              </tr>';
          } else if (isExpanded && totalCount > SECTION_PAGE_SIZE) {
            // Show "Show less" row when expanded
            html += '\
              <tr class="load-more-row" data-section="' + sectionKey + '" data-collapse="true">\
                <td colspan="2">\
                  <span class="load-more-text">Show less</span>\
                </td>\
              </tr>';
          }
          
          html += '</tbody></table></div></section>';

        }

        function renderSandboxRow(group) {
          var sandboxId = group.sandboxId;
          var isExpanded = state.expandedSandboxes.has(sandboxId);
          var isEditing = state.editingSandboxId === sandboxId;
          var displayName = state.sandboxNames[sandboxId] || sandboxId;
          var status = (group.status || "MISSING").toUpperCase();
          var statusClass = "status-" + status.toLowerCase();
          var convCount = group.conversations.length;
          
          var nameHtml;
          if (isEditing) {
            nameHtml = '<input type="text" class="sandbox-name-input" id="name-input-' + sandboxId + '" value="' + escapeHtml(displayName) + '" placeholder="Enter name...">';
          } else {
            nameHtml = '<span class="sandbox-name" title="Click to rename">' + escapeHtml(displayName) + '</span>';
          }
          
          var isPending = pendingActions.has(sandboxId);
          var actionBtns = '';
          if (status === "RUNNING") {
            actionBtns = '<button class="btn btn-sm" data-action="pause" data-sandbox="' + sandboxId + '"' + (isPending ? ' disabled' : '') + '>Pause</button>';
          } else if (status === "PAUSED") {
            actionBtns = '<button class="btn btn-primary btn-sm" data-action="resume" data-sandbox="' + sandboxId + '"' + (isPending ? ' disabled' : '') + '>' + (isPending ? 'Waking...' : 'Wake') + '</button>';
          } else if (status === "STARTING") {
            actionBtns = '<button class="btn btn-sm" disabled>Starting...</button>';
          }
          
          var html = '\
            <tr class="sandbox-row' + (isExpanded ? ' expanded' : '') + '" data-sandbox-id="' + sandboxId + '" data-toggle="' + sandboxId + '">\
              <td class="sandbox-cell">\
                <div class="sandbox-cell-main">\
                  <span class="expand-toggle">' + ICONS.chevronRight + '</span>\
                  ' + ICONS.server + '\
                  <div class="sandbox-info" data-edit="' + sandboxId + '">\
                    ' + nameHtml + '\
                    <div class="sandbox-meta">\
                      <span class="sandbox-id copyable" data-copy="' + sandboxId + '" title="Click to copy sandbox ID">' + sandboxId.substring(0, 12) + '...</span>\
                      <span class="meta-pill">' + ICONS.chat + ' ' + convCount + ' conversation' + (convCount !== 1 ? 's' : '') + '</span>\
                      <span class="meta-pill">' + ICONS.clock + ' ' + relativeTime(group.lastActive) + '</span>\
                    </div>\
                  </div>\
                  <span class="status-badge ' + statusClass + '">' + status + '</span>\
                </div>\
              </td>\
              <td class="sandbox-cell sandbox-cell-actions">\
                <div class="actions-row" onclick="event.stopPropagation()">' + actionBtns + '</div>\
              </td>\
            </tr>';
          
          // Expanded row (separate tr for conversations)
          if (isExpanded) {
            html += '\
            <tr class="sandbox-expanded-row">\
              <td colspan="2" class="sandbox-expanded" style="display: table-cell;">\
                <div class="expanded-content">\
                  <div class="expanded-section">\
                    <div class="expanded-section-header">\
                      ' + ICONS.chat + '\
                      <h4 class="expanded-section-title">Conversations (' + convCount + ')</h4>\
                    </div>';
            
            if (convCount === 0) {
              html += '<div class="no-conversations">No conversations in this sandbox</div>';
            } else {
              html += '<div class="conversation-list">';
              group.conversations.forEach(function(conv) {
                var hasUrl = !!conv.conversation_url;
                var hasKey = !!conv.session_api_key;
                var connStatus = hasUrl && hasKey ? 'ready' : 'missing';
                var connLabel = hasUrl && hasKey ? '✓ Ready' : (hasUrl ? '⚠ No key' : (hasKey ? '⚠ No URL' : '✗ No connection info'));
                html += '\
                  <div class="conversation-item" data-conversation-id="' + conv.id + '">\
                    <div class="conversation-info">\
                      <span class="conversation-title">' + escapeHtml(conv.title || "Untitled") + '</span>\
                      <span class="conversation-meta">\
                        ' + relativeTime(conv.updated_at) + '\
                        <span class="conn-status conn-' + connStatus + '">' + connLabel + '</span>\
                      </span>\
                    </div>\
                    <span class="conversation-arrow">' + ICONS.arrowRight + '</span>\
                  </div>';
              });
              html += '</div>';
            }
            
            // Add conversation button
            html += '<button class="add-conversation-btn" data-sandbox-id="' + sandboxId + '">' + ICONS.plus + ' Add Conversation</button>';
            
            html += '</div></div></td></tr>';
          }
          
          return html;
        }

        function escapeHtml(str) {
          if (!str) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function attachEventListeners() {
          // Search
          var searchInput = document.getElementById("search-input");
          if (searchInput) {
            searchInput.addEventListener("input", function() {
              state.searchQuery = this.value;
              render();
            });
          }
          
          // Filter buttons (toggle on click)
          var filterRunning = document.getElementById("filter-running");
          var filterPaused = document.getElementById("filter-paused");
          var filterStopped = document.getElementById("filter-stopped");
          
          if (filterRunning) {
            filterRunning.addEventListener("click", function() {
              state.filters.running = !state.filters.running;
              render();
            });
          }
          if (filterPaused) {
            filterPaused.addEventListener("click", function() {
              state.filters.paused = !state.filters.paused;
              render();
            });
          }
          if (filterStopped) {
            filterStopped.addEventListener("click", function() {
              state.filters.stopped = !state.filters.stopped;
              render();
            });
          }
          
          // Row expand/collapse
          document.querySelectorAll("[data-toggle]").forEach(function(el) {
            el.addEventListener("click", function(e) {
              // Don't toggle if clicking on actions, name edit, or buttons
              if (e.target.closest(".actions-row") || e.target.closest("[data-edit]") || e.target.tagName === "BUTTON") return;
              
              var sandboxId = this.dataset.toggle;
              if (state.expandedSandboxes.has(sandboxId)) {
                state.expandedSandboxes.delete(sandboxId);
              } else {
                state.expandedSandboxes.add(sandboxId);
              }
              render();
            });
          });
          
          // Name editing
          document.querySelectorAll("[data-edit]").forEach(function(el) {
            el.addEventListener("click", function(e) {
              e.stopPropagation();
              var sandboxId = this.dataset.edit;
              state.editingSandboxId = sandboxId;
              render();
              
              // Focus the input
              setTimeout(function() {
                var input = document.getElementById("name-input-" + sandboxId);
                if (input) {
                  input.focus();
                  input.select();
                }
              }, 0);
            });
          });
          
          // Name input handlers
          document.querySelectorAll(".sandbox-name-input").forEach(function(input) {
            input.addEventListener("blur", function() {
              var sandboxId = this.id.replace("name-input-", "");
              saveSandboxName(sandboxId, this.value.trim() || sandboxId);
            });
            input.addEventListener("keydown", function(e) {
              if (e.key === "Enter") {
                this.blur();
              }
              if (e.key === "Escape") {
                state.editingSandboxId = null;
                render();
              }
            });
            input.addEventListener("click", function(e) {
              e.stopPropagation();
            });
          });
          
          // Action buttons
          document.querySelectorAll("[data-action]").forEach(function(btn) {
            btn.addEventListener("click", function(e) {
              e.stopPropagation();
              var action = this.dataset.action;
              var sandboxId = this.dataset.sandbox;
              
              if (action === "pause") {
                pauseSandbox(sandboxId);
              } else if (action === "resume") {
                resumeSandbox(sandboxId);
              }
            });
          });
          
          // Load more / Show less rows
          document.querySelectorAll(".load-more-row").forEach(function(row) {
            row.addEventListener("click", function(e) {
              e.stopPropagation();
              var sectionKey = this.dataset.section;
              var isCollapse = this.dataset.collapse === "true";
              
              if (isCollapse) {
                state.expandedSections.delete(sectionKey);
              } else {
                state.expandedSections.add(sectionKey);
              }
              render({ force: true });
            });
          });
          
          // Conversation item click - navigate to conversation
          document.querySelectorAll(".conversation-item[data-conversation-id]").forEach(function(item) {
            item.addEventListener("click", function(e) {
              e.stopPropagation();
              var conversationId = this.dataset.conversationId;
              if (conversationId && agentCanvas.navigation) {
                agentCanvas.navigation.navigate("/conversations/" + conversationId);
              }
            });
          });
          
          // Copyable elements (sandbox ID, conversation ID)
          document.querySelectorAll(".copyable[data-copy]").forEach(function(el) {
            el.addEventListener("click", function(e) {
              e.stopPropagation();
              var text = this.dataset.copy;
              if (text && navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function() {
                  agentCanvas.window.showInformationMessage("Copied to clipboard: " + text);
                });
              }
            });
          });
          
          // New Sandbox button - navigate to home to start a new conversation
          var newSandboxBtn = document.getElementById("new-sandbox-btn");
          if (newSandboxBtn) {
            newSandboxBtn.addEventListener("click", function(e) {
              e.stopPropagation();
              if (agentCanvas.navigation) {
                agentCanvas.navigation.navigate("/");
              }
            });
          }
          
          // Add Conversation button inside expanded sandbox - creates conversation with sandbox ID
          document.querySelectorAll(".add-conversation-btn[data-sandbox-id]").forEach(function(btn) {
            btn.addEventListener("click", function(e) {
              e.stopPropagation();
              var sandboxId = this.dataset.sandboxId;
              var button = this;
              
              // Disable button and show loading state
              button.disabled = true;
              var originalContent = button.innerHTML;
              button.innerHTML = '<span style="display: inline-flex; align-items: center; gap: 6px;">Creating...</span>';
              
              // Create conversation with the sandbox ID
              agentCanvas.conversation.create({
                sandboxId: sandboxId
              }).then(function(conversationId) {
                // Navigation happens automatically in createConversation
                agentCanvas.window.showInformationMessage("Created conversation in sandbox");
              }).catch(function(err) {
                agentCanvas.window.showInformationMessage("Failed to create conversation: " + err.message);
                button.disabled = false;
                button.innerHTML = originalContent;
              });
            });
          });
        }

        // Global refresh function
        window.refresh = function() {
          fetchData();
        };

        // Auto-refresh every 30 seconds
        setInterval(function() {
          if (!state.loading && state.cloudAvailable) {
            fetchData();
          }
        }, 30000);

        // Wait for host "ready" signal before making API calls
        // The host sends this after the RPC endpoint is established
        var hostReady = false;
        window.addEventListener("message", function(event) {
          if (event.data && event.data.type === "agentCanvas:ready") {
            if (!hostReady) {
              hostReady = true;
              fetchData();
            }
          }
        });
        
        // Fallback: if ready signal doesn't arrive within 100ms, try anyway
        // (for backwards compatibility or if the host doesn't send the signal)
        setTimeout(function() {
          if (!hostReady) {
            hostReady = true;
            fetchData();
          }
        }, 100);
      })();
    </script>
  </body>
</html>
