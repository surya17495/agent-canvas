# Containerized ACP agent-server for Agent Canvas (agent-canvas#1014).
#
# Brings up the OpenHands Agent Server image — which pre-installs the ACP CLI
# wrappers (claude-agent-acp / codex-acp / gemini) — with a persistent volume so
# conversations and materialised credential files survive restarts. Point Canvas
# at it with VITE_BACKEND_BASE_URL=http://localhost:8010 (the image's CORS allows
# localhost, so the browser talks to it directly).
#
#   1. Copy .env.example to .env and fill in the credentials for the provider(s)
#      you want to run (see that file + ../../docs/ACP_AGENTS.md → "Running ACP
#      agents in a Docker container").
#   2. `docker compose up`        (from this directory)
#   3. Run Canvas pointed at it:  VITE_BACKEND_BASE_URL=http://localhost:8010 npm run dev:frontend
#
# The credentials below are read from your shell/.env and handed to Canvas via
# the onboarding "Set up credentials" step; this file only needs them if you
# prefer to bake host logins into the container instead of entering them in the
# UI. Leave them unset to supply everything through Canvas.

services:
  agent-server:
    # Pin to a software-agent-sdk main commit that includes the containerized
    # ACP merges (#1020 file-secret materialisation, #3490 npx→pinned-binary,
    # #3492 per-conversation data-dir). Override with:
    #   AGENT_SERVER_IMAGE=ghcr.io/openhands/agent-server:<sha>-python docker compose up
    # Get the latest main sha with:
    #   gh api repos/OpenHands/software-agent-sdk/commits/main --jq '.sha[0:7]'
    image: ${AGENT_SERVER_IMAGE:-ghcr.io/openhands/agent-server:c950fdb-python}
    container_name: oh-acp
    ports:
      # host:container — Canvas points VITE_BACKEND_BASE_URL at http://localhost:8010.
      - "8010:8000"
    environment:
      # Canvas's start request always references the bundled ``canvas_ui`` tool
      # via ``tool_module_qualnames``; the agent-server imports that module from
      # OH_EXTRA_PYTHON_PATH at conversation creation. Without the mount below +
      # this var, conversation creation fails to import ``canvas_ui_tool``.
      - OH_EXTRA_PYTHON_PATH=/canvas-tools
      # The agent-server's CORS already allows localhost origins, so no extra
      # config is needed for the browser to reach it directly.
      #
      # Optionally bake provider logins into the container instead of entering
      # them in the Canvas onboarding step. These are passed through from .env;
      # unset values are simply not exported. NOTE: the recommended path is to
      # enter credentials in Canvas (they ride the start request as secrets) —
      # this is here for non-interactive / CI setups.
      - ANTHROPIC_API_KEY
      - CLAUDE_CODE_OAUTH_TOKEN
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - GOOGLE_CLOUD_PROJECT
      - GOOGLE_CLOUD_LOCATION
      - GOOGLE_GENAI_USE_VERTEXAI
      # Set a session key to require auth; mirror it into Canvas via
      # VITE_SESSION_API_KEY. Leave unset for an open local backend.
      # - SESSION_API_KEY
    volumes:
      # Persist conversations AND the credential files the SDK materialises
      # (Codex auth.json under CODEX_HOME, Gemini ADC/SA JSON) across restarts.
      - acp-data:/workspace
      # Canvas-specific Python tools (the canvas_ui tool) the agent-server loads
      # via OH_EXTRA_PYTHON_PATH. Path is relative to this compose file.
      - ../../tools:/canvas-tools:ro
    restart: unless-stopped

volumes:
  acp-data:
