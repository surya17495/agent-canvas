name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.0.0-alpha.8)'
        required: true
        type: string

concurrency:
  group: npm-publish-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Trusted publishing requires Node 22.14.0+ and npm 11.5.1+
      # See: https://docs.npmjs.com/trusted-publishers/
      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify npm version supports trusted publishing
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          NPM_VERSION=$(npm --version)
          NPM_MAJOR=$(echo $NPM_VERSION | cut -d. -f1)
          NPM_MINOR=$(echo $NPM_VERSION | cut -d. -f2)
          if [ "$NPM_MAJOR" -lt 11 ] || ([ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 5 ]); then
            echo "Error: npm 11.5.1+ required for trusted publishing, got $NPM_VERSION"
            exit 1
          fi
          echo "✓ npm $NPM_VERSION meets trusted publishing requirements"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build library
        run: npm run build:lib

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Validate package version matches release tag
        env:
          # Pass inputs.tag via env var to prevent script injection from
          # GitHub Actions expression interpolation inside run blocks.
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          # Resolve tag: prefer workflow_dispatch input, fall back to push-event GITHUB_REF
          if [ -n "$INPUT_TAG" ]; then
            RAW_TAG="$INPUT_TAG"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG_VERSION="${RAW_TAG#v}"
          echo "Package version: $PACKAGE_VERSION"
          echo "Release tag version: $TAG_VERSION"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) doesn't match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version $PACKAGE_VERSION matches release tag"

      # Temporary: publish all versions (including prerelease) as "latest"
      # until the first stable release (see cleanup issue #395).
      # Note: OIDC trusted-publishing tokens cover only the `npm publish`
      # call itself; a separate `npm dist-tag add` after publish fails
      # with E401, so we publish directly with --tag latest in one step.
      #
      # Named prerelease dist-tags (alpha/beta/rc) are intentionally NOT
      # published under this policy — only "latest" is used. This means
      # `npm install @openhands/agent-canvas@alpha` will not resolve to
      # any published version. When prerelease dist-tags need to be
      # re-introduced (issue #395 cleanup), update this step to publish
      # with a versioned dist-tag (e.g. --tag alpha) and only tag stable
      # releases as "latest".
      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --tag latest
